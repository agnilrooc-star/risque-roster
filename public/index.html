<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Risque Guild Roster</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

</head>

<body>

<header>
    <h1>RISQUE GUILD ROSTER</h1>
</header>

<div class="container">

    <!-- LEFT PANEL -->

    <aside id="playersPanel">

        <h2>Available Players</h2>

        <div class="playerForm">

            <label for="playerIGN">IGN</label>

            <input
                type="text"
                id="playerIGN"
                placeholder="Enter IGN"
                autocomplete="off"
            >

            <label for="playerClass">Class</label>

            <select id="playerClass">

                <option value="Priest">Priest</option>

                <option value="Knight">Knight</option>

                <option value="Blacksmith">Blacksmith</option>

                <option value="Wizard">Wizard</option>

                <option value="Hunter">Hunter</option>

                <option value="GS">GS</option>

                <option value="Druid">Druid</option>

            </select>

            <label for="playerRole">Role</label>

            <select id="playerRole">

                <option value="Tank">Tank</option>

                <option value="M-DPS">M-DPS</option>

                <option value="P-DPS">P-DPS</option>

                <option value="Support">Support</option>

                <option value="Utility">Utility</option>

            </select>

            <button id="addPlayerBtn">

                + Add Player

            </button>

            <input
                type="text"
                id="searchPlayer"
                placeholder="🔍 Search IGN..."
                autocomplete="off"
            >

        </div>

        <div id="players"></div>

    </aside>

    <!-- RIGHT PANEL -->

    <main id="rosters">

        <!-- Generated by script.js -->

    </main>

</div>

<script src="script.js"></script>

</body>

</html>
